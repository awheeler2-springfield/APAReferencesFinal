<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APA Reference Builder Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #edf6f4;
      --panel: #ffffff;
      --line: #b8ddd7;
      --text: #1a252f;
      --muted: #4a6670;
      --accent: #0891b2;
      --accent-2: #06b6d4;
      --soft: #e0f7fa;
      --success: #0e7490;
      --success-bg: #cffafe;
      --warn: #854d0e;
      --warn-bg: #fef9c3;
      --danger: #c2410c;
      --danger-bg: #fff1eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Poppins', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    /* Yellow highlight — mirrors the video's key-term emphasis */
    .hl {
      background: #fde047;
      color: #1a252f;
      border-radius: 4px;
      padding: 0 3px;
      font-weight: 600;
    }

    a { color: var(--accent); }
    button, input { font: inherit; }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 22px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .topbar h1 { margin: 0; font-size: 1.9rem; }
    .topbar p  { margin: 4px 0 0; color: var(--muted); }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 18px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 18px;
    }

    .hero-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      background: #f0fbf9;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #c9d3e6;
      background: white;
      color: var(--text);
      cursor: pointer;
      transition: 0.18s ease;
    }

    .btn:hover:not(:disabled) { transform: translateY(-1px); }

    .btn-primary  { background: var(--accent); border-color: var(--accent); color: white; }
    .btn-secondary { background: var(--soft); color: var(--accent); }

    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
      align-items: center;
    }

    .small { color: var(--muted); font-size: 0.94rem; }

    .progress {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 13px;
      font-size: 0.88rem;
      background: #f0fbf9;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chip.active {
      background: var(--soft);
      color: var(--accent);
      font-weight: 600;
      border-color: var(--accent-2);
    }

    .chip.done {
      background: #fef9c3;
      color: #854d0e;
      font-weight: 600;
      border-color: #fde047;
    }

    .chip-icon { font-size: 1rem; line-height: 1; }

    .builder-grid {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 18px;
    }

    .artifact-wrap {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #f0fbf9;
      padding: 16px;
    }

    .artifact-tag {
      display: inline-block;
      margin-bottom: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #0e7490;
      background: #cffafe;
      border: 1px solid #a5f3fc;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .artifact { background: white; border: 1px solid #dfe5f0; border-radius: 12px; padding: 16px; }
    .artifact .muted { color: #64748b; font-size: 0.95rem; }
    .artifact .title { font-size: 1.4rem; font-weight: bold; margin: 10px 0 6px; }
    .artifact .container { font-size: 1.1rem; font-style: italic; margin: 8px 0; }
    .artifact .rule { border-top: 1px solid #e6ebf4; margin: 12px 0; }

    .task-box {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: white;
      margin-bottom: 14px;
    }

    .task-box h4 { margin: 0 0 10px; }

    .option {
      display: block;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 8px;
      background: #fcfdff;
      cursor: pointer;
    }

    .option input { margin-right: 8px; }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field { margin-bottom: 12px; }
    .field label { display: block; font-weight: bold; margin-bottom: 6px; }
    .field input {
      width: 100%;
      padding: 10px 11px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: white;
    }

    .feedback-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 18px;
    }

    .feedback-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      min-height: 150px;
      background: white;
    }

    .feedback-card.success { background: #cffafe; border-color: #67e8f9; }
    .feedback-card.warn    { background: #fef9c3; border-color: #fde047; }
    .feedback-card.danger  { background: #fff1eb; border-color: #fdba74; }
    .feedback-card h4      { margin-top: 0; }
    .feedback-card ul      { padding-left: 18px; margin-bottom: 0; }

    .verify-box {
      margin-top: 16px;
      border: 1px dashed #67e8f9;
      border-radius: 12px;
      padding: 14px;
      background: #f0fbf9;
    }

    .reference-preview {
      background: white;
      border: 1px solid #d9e3f4;
      border-radius: 10px;
      padding: 12px;
      margin-top: 10px;
      line-height: 1.7;
    }

    .reference-preview .ital { font-style: italic; }

    .example-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      background: white;
    }

    .example-card .prompt { font-weight: bold; margin-bottom: 10px; }

    .example-option {
      display: block;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 8px;
      background: #fcfdff;
      cursor: pointer;
    }

    .example-option input { margin-right: 8px; }

    .status-line { margin-top: 12px; font-weight: bold; }

    .badge-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 18px;
      align-items: start;
    }

    .badge-box {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      background: white;
      text-align: center;
    }

    canvas {
      width: 100%;
      max-width: 320px;
      height: auto;
      border-radius: 12px;
      border: 1px solid #dfe5f0;
      background: white;
    }

    .callout {
      border-left: 5px solid var(--accent);
      background: #e0f7fa;
      padding: 14px 16px;
      border-radius: 12px;
    }

    .summary-section {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }

    .summary-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .summary-section h4 { margin: 0 0 10px; }
    .summary-section ul { margin: 8px 0 0; padding-left: 20px; }
    .summary-section li { margin-bottom: 6px; }

    .reset-link {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.88rem;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .reset-link:hover { color: var(--danger); }

    @media (max-width: 950px) {
      .hero, .builder-grid, .feedback-grid, .badge-layout, .field-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app"></div>

    /* ─── Example Bank ──────────────────────────────────────────────── */

    /* ─── Shuffle + Prepare Examples ───────────────────────────────── */

    function shuffle(array) {
      const clone = array.slice();
      for (let i = clone.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [clone[i], clone[j]] = [clone[j], clone[i]];
      }
      return clone;
    }

    const preparedExamples = exampleBank.map((item, index) => {
      const options = shuffle([
        { text: item.correct, html: item.correctHtml, isCorrect: true },
        ...item.distractors.map((text, i) => ({
          text,
          html: item.distractorHtmls ? item.distractorHtmls[i] : null,
          isCorrect: false
        }))
      ]);
      return { ...item, id: `example_${index + 1}`, options };
    });

    /* ─── Field Evaluation Helpers ──────────────────────────────────── */

    function norm(value) {
      return (value || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    function raw(value) { return String(value || '').trim(); }

    function pagesNorm(value) {
      return (value || '').replace(/–/g, '-').replace(/\s/g, '');
    }

    function volumeIssueNorm(value) {
      return (value || '').toLowerCase().replace(/\s/g, '');
    }

    /*
     * FIX 1: authorInitialsLikely — requires APA inverted format "Last, F."
     * Prevents false positives from middle initials like "John A. Smith".
     */
    function authorInitialsLikely(value) {
      return /[A-Za-z]+,\s+[A-Z]\./.test(String(value || ''));
    }

    /*
     * FIX 1: editorInitialsLikely — editors in chapter references use "F. Last" format.
     * Accepts either "F. Last" style (forward) or "Last, F." style (inverted).
     */
    function editorInitialsLikely(value) {
      const s = String(value || '');
      const forwardStyle  = /(?:^|[,&]\s+)[A-Z]\./.test(s);   // M. Chen or & F. Gomez
      const invertedStyle = /[A-Za-z]+,\s+[A-Z]\./.test(s);   // Chen, M.
      return forwardStyle || invertedStyle;
    }

    function isLikelySentenceCase(value) {
      const text = raw(value);
      if (!text) return false;
      const words = text.split(/\s+/);
      if (words.length <= 1) return true;
      return words.slice(1).every(word => {
        const cleaned = word.replace(/[^A-Za-z]/g, '');
        if (!cleaned) return true;
        return cleaned.charAt(0) === cleaned.charAt(0).toLowerCase();
      });
    }

    /*
     * FIX 4: isLikelyTitleCase — journal names use title case in APA 7.
     * Minor words (a, an, the, conjunctions, short prepositions) may be lowercase
     * except at the start.
     */
    function isLikelyTitleCase(value) {
      const text = raw(value);
      if (!text) return false;
      const minorWords = new Set(['a','an','the','and','but','or','for','nor','on','at','to','by','in','of','up','as']);
      const words = text.split(/\s+/);
      return words.every((word, index) => {
        const cleaned = word.replace(/[^A-Za-z]/g, '');
        if (!cleaned) return true;
        if (index === 0) return cleaned.charAt(0) === cleaned.charAt(0).toUpperCase();
        if (minorWords.has(cleaned.toLowerCase())) return true;
        return cleaned.charAt(0) === cleaned.charAt(0).toUpperCase();
      });
    }

    function dateNorm(value) {
      return raw(value).toLowerCase().replace(/[,()]/g, '').replace(/\s+/g, ' ');
    }

    /*
     * FIX 5: normalizeUrl — strips protocol and trailing slash before comparing,
     * so minor variations don't produce a Tier 3 error.
     */
    function normalizeUrl(value) {
      return String(value || '')
        .trim()
        .toLowerCase()
        .replace(/^https?:\/\//, '')
        .replace(/^www\./, '')
        .replace(/\/$/, '');
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /* ─── Evaluate Source ───────────────────────────────────────────── */

    function evaluateSource(sourceId) {
      const values    = getFormValues(sourceId);
      const decisions = getDecisionValues(sourceId);
      const source    = sourceData[sourceId];
      const tier1 = [], tier2 = [], tier3 = [];

      /* Decision checks */
      source.decisions.forEach(decision => {
        const userChoice = decisions[decision.id];
        if (userChoice === decision.correct) {
          tier1.push(decision.success);
        } else if (userChoice) {
          tier3.push(decision.correction);
        }
      });

      /* Field checks */
      if (sourceId === 'journal') {
        const rawAuthor = raw(values.author);
        const authorNorm = norm(rawAuthor);
        if (authorNorm.includes('smith') && authorNorm.includes('lee')) {
          tier1.push('You identified the correct authors.');
          if (!authorInitialsLikely(rawAuthor))
            tier2.push('Format author names in APA style: Last, F. M. (e.g., Smith, J. A., & Lee, P. R.)');
        } else if (rawAuthor) {
          tier3.push('The author field does not identify the article authors correctly.');
        }

        const rawYear = raw(values.year);
        if (norm(rawYear) === '2021') {
          tier1.push('You identified the correct year.');
        } else if (rawYear) {
          tier3.push('The year is incorrect for this article.');
        }

        const rawTitle = raw(values.title);
        if (norm(rawTitle).includes('interfacefriction')) {
          tier1.push('You identified the correct article title.');
          if (!isLikelySentenceCase(rawTitle))
            tier2.push('Convert the article title to sentence case (only the first word and proper nouns capitalized).');
        } else if (rawTitle) {
          tier3.push('The article title is incorrect.');
        }

        /* FIX 4: journal name requires title case */
        const rawJournal = raw(values.journal);
        if (norm(rawJournal).includes('digitalcommunicationreview')) {
          tier1.push('You identified the correct journal title.');
          if (!isLikelyTitleCase(rawJournal))
            tier2.push('Journal titles use title case in APA (capitalize each major word, e.g., Digital Communication Review).');
        } else if (rawJournal) {
          tier3.push('The journal title is incorrect.');
        }

        const rawVolume = raw(values.volume);
        const v = volumeIssueNorm(rawVolume);
        if (v.includes('14') && v.includes('2')) {
          tier1.push('You identified the correct volume and issue.');
          if (v !== '14(2)')
            tier2.push('You have the right volume and issue; format them in APA style as 14(2).');
        } else if (rawVolume) {
          tier3.push('The volume and issue do not match the source.');
        }

        const rawPages = raw(values.pages);
        const p = pagesNorm(rawPages);
        if (p.includes('123') && p.includes('135')) {
          tier1.push('You identified the correct page range.');
          if (rawPages.includes('-') && !rawPages.includes('–'))
            tier2.push('Use an en dash (–) instead of a hyphen (-) in the page range.');
        } else if (rawPages) {
          tier3.push('The page range is incorrect.');
        }
      }

      if (sourceId === 'webpage_author') {
        const rawAuthor = raw(values.author);
        const authorNorm = norm(rawAuthor);
        if (authorNorm.includes('patel')) {
          tier1.push('You identified the correct webpage author.');
          if (!authorInitialsLikely(rawAuthor))
            tier2.push('Format the author name in APA style: Last, F. (e.g., Patel, M.)');
        } else if (rawAuthor) {
          tier3.push('The webpage author is incorrect.');
        }

        const rawDate = raw(values.date);
        const normalizedDate = dateNorm(rawDate);
        if (normalizedDate.includes('2023') && normalizedDate.includes('july') && normalizedDate.includes('18')) {
          tier1.push('You identified the correct webpage date.');
          const looksApaDate = /^\d{4},\s*[A-Za-z]+\s+\d{1,2}$/.test(rawDate);
          if (!looksApaDate)
            tier2.push('You have the right date; format it in APA date order (e.g., 2023, July 18).');
        } else if (rawDate) {
          tier3.push('The date is incorrect for this webpage.');
        }

        const rawTitle = raw(values.title);
        if (norm(rawTitle).includes('studentsmisread')) {
          tier1.push('You identified the correct webpage title.');
          if (!isLikelySentenceCase(rawTitle))
            tier2.push('Use sentence case for the webpage title.');
        } else if (rawTitle) {
          tier3.push('The webpage title is incorrect.');
        }

        const rawSite = raw(values.site);
        if (norm(rawSite).includes('learninglab')) {
          tier1.push('You identified the correct website name.');
        } else if (rawSite) {
          tier3.push('The website name is incorrect.');
        }

        /* FIX 5: softened URL matching */
        const rawUrl = raw(values.url);
        const correctUrl = 'https://www.thelearninglab.org/teaching/why-students-misread-source-details';
        if (rawUrl && normalizeUrl(rawUrl) === normalizeUrl(correctUrl)) {
          tier1.push('You identified the correct URL.');
          if (!rawUrl.toLowerCase().startsWith('https://'))

      if (sourceId === 'book') {

          tier1.push('You identified the correct book author.');

          tier3.push('The book author is incorrect.');

        const rawYear = raw(values.year);
        if (norm(rawYear) === '2020') {
          tier1.push('You identified the correct year.');
        } else if (rawYear) {
          tier3.push('The year is incorrect for this book.');
        }

        const rawTitle = raw(values.title);
        if (norm(rawTitle).includes('writingresearch')) {
          tier1.push('You identified the correct book title.');

            tier2.push('Use sentence case for the book title (only first word and proper nouns capitalized).');
        } else if (rawTitle) {
          tier3.push('The book title is incorrect.');
        }

        const rawPublisher = raw(values.publisher);
        if (norm(rawPublisher).includes('riverbendacademicpress')) {
          tier1.push('You identified the correct publisher.');
        } else if (rawPublisher) {
          tier3.push('The publisher is incorrect.');
        }
      }

      if (sourceId === 'webpage_no_author') {
        const rawTitle = raw(values.title);
        if (norm(rawTitle).includes('referencelistchecklist')) {
          tier1.push('You identified the correct title for the author position.');
          if (!isLikelySentenceCase(rawTitle))
            tier2.push('Use sentence case for the title.');
        } else if (rawTitle) {
          tier3.push('The title is incorrect for this no-author webpage reference.');
        }

        const rawDate = raw(values.date);
        const normalizedDate = dateNorm(rawDate);
        if (normalizedDate.includes('2024') && normalizedDate.includes('september') && normalizedDate.includes('2')) {
          tier1.push('You identified the correct webpage date.');
          const looksApaDate = /^\d{4},\s*[A-Za-z]+\s+\d{1,2}$/.test(rawDate);
          if (!looksApaDate)

          tier3.push('The date is incorrect for this webpage.');
        }

        const rawSite = raw(values.site);
        if (norm(rawSite).includes('campuswritingcenter')) {
          tier1.push('You identified the correct website name.');
        } else if (rawSite) {
          tier3.push('The website name is incorrect.');
        }

        /* FIX 5: softened URL matching */
        const rawUrl = raw(values.url);
        const correctUrl = 'https://campuswritingcenter.edu/reference-list-checklist';
        if (rawUrl && normalizeUrl(rawUrl) === normalizeUrl(correctUrl)) {
          tier1.push('You identified the correct URL.');
          if (!rawUrl.toLowerCase().startsWith('https://'))
            tier2.push('Include the complete URL beginning with https://');
        } else if (rawUrl) {
          tier3.push('The URL is incorrect.');
        }
      }

      if (sourceId === 'chapter') {
        const rawChapterAuthor = raw(values.chapterAuthor);
        if (norm(rawChapterAuthor).includes('brooks')) {
          tier1.push('You identified the correct chapter author.');
          if (!authorInitialsLikely(rawChapterAuthor))

        } else if (rawChapterAuthor) {
          tier3.push('The chapter author is incorrect.');
        }

        const rawYear = raw(values.year);
        if (norm(rawYear) === '2022') {
          tier1.push('You identified the correct year.');
        } else if (rawYear) {
          tier3.push('The year is incorrect.');
        }

        const rawChapterTitle = raw(values.chapterTitle);
        if (norm(rawChapterTitle).includes('learningthroughworkedexamples')) {
          tier1.push('You identified the correct chapter title.');
          if (!isLikelySentenceCase(rawChapterTitle))
            tier2.push('Use sentence case for the chapter title.');
        } else if (rawChapterTitle) {
          tier3.push('The chapter title is incorrect.');
        }

        const rawEditors = raw(values.editors);
        const editorsNorm = norm(rawEditors);
        if (editorsNorm.includes('chen') && editorsNorm.includes('gomez')) {
          tier1.push('You identified the correct editors.');
          /* FIX 1: use editorInitialsLikely for forward-format editor names */
          if (!editorInitialsLikely(rawEditors))
            tier2.push('Format editors with initials in APA style (e.g., M. Chen & F. Gomez).');
        } else if (rawEditors) {
          tier3.push('The editors are incorrect.');
        }

        const rawBookTitle = raw(values.bookTitle);
        if (norm(rawBookTitle).includes('teachingwritingacrosscontexts')) {
          tier1.push('You identified the correct book title.');
          if (!isLikelySentenceCase(rawBookTitle))
            tier2.push('Use sentence case for the book title — APA 7 requires sentence case in the reference list even though the cover uses title case.');
        } else if (rawBookTitle) {
          tier3.push('The book title is incorrect.');
        }

        const rawPages = raw(values.pages);
        const p = pagesNorm(rawPages);
        if (p.includes('77') && p.includes('101')) {
          tier1.push('You identified the correct page range.');
          if (rawPages.includes('-') && !rawPages.includes('–'))
            tier2.push('Use an en dash (–) instead of a hyphen (-) in the page range.');
        } else if (rawPages) {
          tier3.push('The page range is incorrect.');
        }

        const rawPublisher = raw(values.publisher);
        if (norm(rawPublisher).includes('northstreetpress')) {
          tier1.push('You identified the correct publisher.');
        } else if (rawPublisher) {
          tier3.push('The publisher is incorrect.');
        }
      }

      /* FIX 2: Block completion if any field is left blank */
      const allFilled = source.fields.every(([key]) => raw(values[key]).length > 0);
      if (!allFilled) {
        tier3.push('Fill in all reference fields before checking your work.');
      }

      return {
        tier1: [...new Set(tier1)],
        tier2: [...new Set(tier2)],
        tier3: [...new Set(tier3)],
        canComplete: tier3.length === 0
      };
    }

    /* ─── Builder Logic ─────────────────────────────────────────────── */

    function checkBuilder() {
      const sourceId = getCurrentSourceId();
      const feedback = evaluateSource(sourceId);
      appState.feedbackBySource[sourceId] = feedback;
      appState.verifyUnlocked[sourceId] = true;

      if (feedback.canComplete) {
        appState.builderProgress[sourceId] = true;
        appState.completionReady = sourceOrder.every(id => !!appState.builderProgress[id]);
      }

      render();
    }

    function nextSource() {
      const sourceId = getCurrentSourceId();
      const feedback = appState.feedbackBySource[sourceId];
      if (!feedback || !feedback.canComplete) return;

      if (appState.currentSourceIndex < sourceOrder.length - 1) {
        appState.currentSourceIndex += 1;
        render();
      } else {
        navigateTo('completion');
      }
    }

    function toggleVerify(sourceId) {
      appState.verifyOpen[sourceId] = !appState.verifyOpen[sourceId];
      render();
    }

    /* ─── Badge ─────────────────────────────────────────────────────── */

    function drawBadge() {
      const canvas = document.getElementById('badgeCanvas');
      if (!canvas) return;

      const ctx  = canvas.getContext('2d');
      const name = raw(appState.userName) || 'Student';

      canvas.width  = 900;
      canvas.height = 900;

      const gradient = ctx.createLinearGradient(0, 0, 900, 900);
      gradient.addColorStop(0, '#18347c');
      gradient.addColorStop(1, '#4d86ff');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 900, 900);

      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.beginPath(); ctx.arc(720, 180, 120, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(220, 760, 170, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = '#ffffff';
      roundRect(ctx, 90, 90, 720, 720, 40, true, false);

      ctx.strokeStyle = '#d5e1ff';
      ctx.lineWidth = 10;
      roundRect(ctx, 120, 120, 660, 660, 34, false, true);

      ctx.fillStyle = '#23408e';
      ctx.beginPath(); ctx.arc(450, 290, 92, 0, Math.PI * 2); ctx.fill();

      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 16;
      ctx.beginPath();
      ctx.moveTo(408, 288); ctx.lineTo(440, 322); ctx.lineTo(496, 252);
      ctx.stroke();

      ctx.fillStyle  = '#183153';
      ctx.font       = 'bold 44px Arial';
      ctx.textAlign  = 'center';
      ctx.fillText('APA Reference Builder Lab', 450, 440);

      ctx.fillStyle = '#456086';
      ctx.font      = '28px Arial';
      ctx.fillText('Completion Badge', 450, 488);

      ctx.fillStyle = '#23408e';
      ctx.font      = 'bold 38px Arial';
      ctx.fillText(name, 450, 585);

      ctx.fillStyle = '#60708f';
      ctx.font      = '24px Arial';
      ctx.fillText('Identified, classified, and formatted core APA references', 450, 640);
      ctx.fillText(new Date().toLocaleDateString(), 450, 680);
    }

    function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
      if (fill)   ctx.fill();
      if (stroke) ctx.stroke();
    }

    function downloadBadge() {
      const canvas = document.getElementById('badgeCanvas');
      const link   = document.createElement('a');
      link.download = 'apa-reference-builder-badge.png';
      link.href     = canvas.toDataURL('image/png');
      link.click();
    }

    async function copyBadge() {
      const canvas = document.getElementById('badgeCanvas');
      if (!navigator.clipboard || !window.ClipboardItem) {
        alert('Copy image is not supported in this browser. Use Download PNG instead.');
        return;
      }
      canvas.toBlob(async blob => {
        try {
          await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
          alert('Badge copied to clipboard.');
        } catch (e) {
          alert('Copy failed in this browser. Use Download PNG instead.');
        }
      });
    }

    /* ─── Progress ──────────────────────────────────────────────────── */

    function overallProgress() {
      const total        = preparedExamples.length + sourceOrder.length;
      const examplesDone = Object.values(appState.exampleResults).filter(Boolean).length;
      const builderDone  = sourceOrder.filter(id => appState.builderProgress[id]).length;
      return Math.round(((examplesDone + builderDone) / total) * 100);
    }

    /* ─── Render: Examples (FIX 3: correct option always green) ─────── */

    function renderExamples() {
      const example  = preparedExamples[appState.currentExampleIndex];
      const selected = appState.exampleResponses[example.id];
      const result   = appState.exampleResults[example.id];

      /*
       * FIX 3: check isCorrect BEFORE checking selected index.
       * This prevents a correct option from being shown in red when the student
       * re-selects it after a wrong attempt.
       */
      const optionsHtml = example.options.map((option, index) => {
        let extraStyle = '';
        let badge      = '';
        if (result === false) {
          if (option.isCorrect) {
            extraStyle = 'border-color: #1f7a42; background: #e9f8ef;';
            badge = index === selected
              ? ' <strong style="color:#1f7a42; font-size:0.9rem;">[correct — selected ✓]</strong>'
              : ' <strong style="color:#1f7a42; font-size:0.9rem;">[correct]</strong>';
          } else if (index === selected) {
            extraStyle = 'border-color: #a4282a; background: #fdeeee;';
            badge = ' <strong style="color:#a4282a; font-size:0.9rem;">[your answer]</strong>';
          }
        }
        return `
          <label class="example-option" style="${extraStyle}">
            <input type="radio" name="exampleOption"
              data-example-id="${escapeHtml(example.id)}"
              data-option-index="${index}"
              ${selected === index ? 'checked' : ''} />
            ${option.html || escapeHtml(option.text)}${badge}
          </label>
        `;
      }).join('');

      const explanationHtml = result === false ? `
        <div class="callout" style="margin-top: 14px;">
          <strong>Pattern to remember:</strong> ${escapeHtml(exampleExplanations[example.sourceId] || '')}
        </div>
      ` : '';

      const statusHtml = result === true
        ? '<div class="status-line" style="color: var(--success);">Correct. Move on to the next source type.</div>'
        : result === false
          ? '<div class="status-line" style="color: var(--danger);">Incorrect. The correct answer is highlighted above. Review the pattern and try again.</div>'
          : '';

      return `
        <div class="panel">
          <h2>Find the Right APA Example</h2>
          <p>Complete all source types here first. The correct answer order is randomized each time the page loads.</p>
          <div class="progress">
            ${preparedExamples.map((item, index) => {
              const cls = appState.exampleResults[item.id] === true ? 'done'
                        : index === appState.currentExampleIndex        ? 'active' : '';
              const icons = { journal:'📄', webpage_author:'🌐', book:'📚', webpage_no_author:'🌐', chapter:'🔖' };
              return `<div class="chip ${cls}"><span class="chip-icon">${icons[item.sourceId]}</span>${index + 1}. ${escapeHtml(sourceData[item.sourceId].shortLabel)}</div>`;
            }).join('')}
          </div>
        </div>

        <div class="example-card">
          <div class="prompt">${appState.currentExampleIndex + 1}. ${escapeHtml(example.prompt)}</div>
          <p class="small"><span class="hl">Source cue:</span> ${escapeHtml(example.artifactSnippet)}</p>
          ${optionsHtml}
          ${explanationHtml}
          ${statusHtml}
          <div class="actions">
            <button class="btn btn-primary" id="checkExampleBtn">Check Answer</button>
          </div>
        </div>
      `;
    }

    /* ─── Render: Builder ───────────────────────────────────────────── */

    function renderBuilder() {
      const sourceId      = getCurrentSourceId();
      const source        = getCurrentSource();
      const values        = getFormValues(sourceId);
      const decisions     = getDecisionValues(sourceId);
      const feedback      = appState.feedbackBySource[sourceId];
      const verifyUnlocked = !!appState.verifyUnlocked[sourceId];

      return `
        <div class="panel">
          <h2>Builder Lab</h2>
          <p>Inspect the source, make key decisions, and then build the reference. You can move on once your source understanding is correct, even if some APA formatting still needs refinement.</p>
          <div class="progress">
            ${sourceOrder.map((id, index) => {
              const cls = appState.builderProgress[id] ? 'done'
                        : index === appState.currentSourceIndex ? 'active' : '';
              const icons = { journal:'📄', webpage_author:'🌐', book:'📚', webpage_no_author:'🌐', chapter:'🔖' };
              return `<div class="chip ${cls}"><span class="chip-icon">${icons[id]}</span>${index + 1}. ${escapeHtml(sourceData[id].shortLabel)}</div>`;
            }).join('')}
          </div>
        </div>

        <div class="builder-grid">
          <div class="panel">
            <h3>1. Inspect the Source</h3>
            <div class="artifact-wrap">
              <div class="artifact-tag">${escapeHtml(source.artifactLabel)}</div>
              ${source.artifactHtml}
            </div>
          </div>

          <div class="panel">
            <h3>2. Make Key Decisions</h3>
            ${source.decisions.map(decision => `
              <div class="task-box">
                <h4>${escapeHtml(decision.prompt)}</h4>
                ${decision.options.map(option => `
                  <label class="option">
                    <input type="radio"
                      name="${escapeHtml(sourceId + '_' + decision.id)}"
                      data-source-id="${escapeHtml(sourceId)}"
                      data-decision-id="${escapeHtml(decision.id)}"
                      data-value="${escapeHtml(option.value)}"
                      ${decisions[decision.id] === option.value ? 'checked' : ''}
                    />
                    ${escapeHtml(option.label)}
                  </label>
                `).join('')}
              </div>
            `).join('')}
          </div>
        </div>

        <div class="panel">
          <h3>3. Build the Reference</h3>
          <div class="field-grid">
            ${source.fields.map(([key, label, placeholder]) => `
              <div class="field">
                <label for="${escapeHtml(sourceId + '_' + key)}">${escapeHtml(label)}</label>
                <input
                  id="${escapeHtml(sourceId + '_' + key)}"
                  value="${escapeHtml(values[key] || '')}"
                  placeholder="${escapeHtml(placeholder)}"
                  data-source-id="${escapeHtml(sourceId)}"
                  data-field-key="${escapeHtml(key)}"
                />
              </div>
            `).join('')}
          </div>

          <div class="actions">
            <button class="btn btn-primary" id="checkBuilderBtn">Check My Work</button>
            <button class="btn" id="toggleVerifyBtn" ${verifyUnlocked ? '' : 'disabled'}>
              ${appState.verifyOpen[sourceId] ? 'Hide' : 'Verify'} with APA Style
            </button>
            <button class="btn btn-secondary" id="nextSourceBtn" ${feedback && feedback.canComplete ? '' : 'disabled'}>
              ${appState.currentSourceIndex === sourceOrder.length - 1 ? 'Finish Lab' : 'Next Source'}
            </button>
          </div>
          ${!verifyUnlocked ? '<p class="small" style="margin-top:6px;">Verify with APA Style is available after your first attempt.</p>' : ''}

          ${feedback ? `
            <div class="feedback-grid">
              <div class="feedback-card success">
                <h4><span class="hl">Tier 1</span> — Correct Identification</h4>
                ${feedback.tier1.length
                  ? `<ul>${feedback.tier1.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`
                  : '<p class="small">No correct identifications yet.</p>'}
              </div>
              <div class="feedback-card warn">
                <h4><span class="hl">Tier 2</span> — APA Conversion Needed</h4>
                ${feedback.tier2.length
                  ? `<ul>${feedback.tier2.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`
                  : '<p class="small">No APA conversion issues flagged.</p>'}
              </div>
              <div class="feedback-card danger">
                <h4><span class="hl">Tier 3</span> — Incorrect Understanding</h4>
                ${feedback.tier3.length
                  ? `<ul>${feedback.tier3.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`
                  : '<p class="small">No blocking misunderstandings detected.</p>'}
              </div>
            </div>
          ` : ''}

          ${appState.verifyOpen[sourceId] ? `
            <div class="verify-box">
              <strong>4. Verify with APA Style</strong>
              <p class="small">This panel is optional support, not a required redirect.</p>
              <div class="reference-preview">${source.referencePreview}</div>
              <p class="small" style="margin-top:10px;">
                Compare with the relevant APA example:
                <a href="${APA_LINKS[sourceId]}" target="_blank" rel="noopener noreferrer">Open source-specific APA Style page</a>
              </p>
            </div>
          ` : ''}
        </div>
      `;
    }

    /* ─── Render: Completion ────────────────────────────────────────── */

    function renderCompletion() {
      const tier2Items = [...new Set(sourceOrder.flatMap(id => {
        const fb = appState.feedbackBySource[id];
        return (fb && fb.tier2) ? fb.tier2 : [];
      }))];

      return `
        <div class="panel">
          <h2>Completion Badge</h2>
          <p>You finished the lab. Generate a badge image with your name and either copy it or download it as a PNG.</p>
          <div class="actions" style="margin-top: 12px;">
            <button class="btn btn-secondary" id="returnToBuilderBtn">← Review Builder Lab</button>
            <button class="reset-link" onclick="resetProgress()">Reset all progress</button>
          </div>
        </div>

        <div class="panel">
          <h3>Lab summary</h3>

          <div class="summary-section">
            <h4>Source types completed</h4>
            <ul>
              ${sourceOrder.map(id => `
                <li>
                  <span style="color:var(--success); font-weight:bold;">✓</span>
                  ${escapeHtml(sourceData[id].label)}
                </li>
              `).join('')}
            </ul>
          </div>

          <div class="summary-section">
            <h4>APA formatting to revisit before your next paper</h4>
            ${tier2Items.length
              ? `<ul>${tier2Items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`
              : '<p class="small" style="margin-top:8px;">No formatting issues flagged — your conversions were clean.</p>'
            }
          </div>

          <div class="summary-section">
            <h4>Official APA Style references used in this lab</h4>
            <ul>
              ${sourceOrder.map(id => `
                <li>
                  <a href="${APA_LINKS[id]}" target="_blank" rel="noopener noreferrer">
                    ${escapeHtml(sourceData[id].label)}
                  </a>
                </li>
              `).join('')}
            </ul>
          </div>
        </div>

        <div class="panel badge-layout">
          <div>
            <div class="field">
              <label for="completionName">Name on badge</label>
              <input id="completionName" value="${escapeHtml(appState.userName)}" placeholder="Enter your name" />
            </div>
            <div class="callout" style="margin-top:16px;">
              Your badge reflects successful completion of the example phase and all five builder source types.
            </div>
            <div class="actions" style="margin-top:18px;">
              <button class="btn btn-secondary" id="copyBadgeBtn">Copy Badge Image</button>
              <button class="btn btn-primary" id="downloadBadgeBtn">Download PNG</button>
            </div>
          </div>

          <div class="badge-box">
            <canvas id="badgeCanvas" width="900" height="900"></canvas>
          </div>
        </div>
      `;
    }

    /* ─── Event Binding ─────────────────────────────────────────────── */

    function bindEvents() {
      const continueToOrientationBtn = document.getElementById('continueToOrientationBtn');
      if (continueToOrientationBtn) continueToOrientationBtn.addEventListener('click', () => navigateTo('orientation'));

      const skipVideoBtn = document.getElementById('skipVideoBtn');
      if (skipVideoBtn) skipVideoBtn.addEventListener('click', () => navigateTo('orientation'));

      const backBtn = document.getElementById('backBtn');
      if (backBtn) backBtn.addEventListener('click', goBack);

      const studentName = document.getElementById('studentName');
      if (studentName) studentName.addEventListener('input', e => { appState.userName = e.target.value; });

      const startExamplesBtn = document.getElementById('startExamplesBtn');
      if (startExamplesBtn) startExamplesBtn.addEventListener('click', () => navigateTo('examples'));

      document.querySelectorAll('input[data-example-id]').forEach(input => {
        input.addEventListener('change', e => {
          selectExampleOption(
            e.target.getAttribute('data-example-id'),
            Number(e.target.getAttribute('data-option-index'))
          );
        });
      });

      const checkExampleBtn = document.getElementById('checkExampleBtn');
      if (checkExampleBtn) checkExampleBtn.addEventListener('click', checkExample);

      document.querySelectorAll('input[data-decision-id]').forEach(input => {
        input.addEventListener('change', e => {
          updateDecision(
            e.target.getAttribute('data-source-id'),
            e.target.getAttribute('data-decision-id'),
            e.target.getAttribute('data-value')
          );
        });
      });

      document.querySelectorAll('input[data-field-key]').forEach(input => {
        input.addEventListener('input', e => {
          updateField(
            e.target.getAttribute('data-source-id'),
            e.target.getAttribute('data-field-key'),
            e.target.value
          );
        });
      });

      const checkBuilderBtn = document.getElementById('checkBuilderBtn');
      if (checkBuilderBtn) checkBuilderBtn.addEventListener('click', checkBuilder);

      const toggleVerifyBtn = document.getElementById('toggleVerifyBtn');
      if (toggleVerifyBtn) toggleVerifyBtn.addEventListener('click', () => toggleVerify(getCurrentSourceId()));

      const nextSourceBtn = document.getElementById('nextSourceBtn');
      if (nextSourceBtn) nextSourceBtn.addEventListener('click', nextSource);

      const completionName = document.getElementById('completionName');
      if (completionName) completionName.addEventListener('input', e => {
        appState.userName = e.target.value;
        drawBadge();
      });

      const downloadBadgeBtn = document.getElementById('downloadBadgeBtn');
      if (downloadBadgeBtn) downloadBadgeBtn.addEventListener('click', downloadBadge);

      const copyBadgeBtn = document.getElementById('copyBadgeBtn');
      if (copyBadgeBtn) copyBadgeBtn.addEventListener('click', copyBadge);

      const returnToBuilderBtn = document.getElementById('returnToBuilderBtn');
      if (returnToBuilderBtn) returnToBuilderBtn.addEventListener('click', () => {
        appState.currentView = 'builder';
        appState.historyStack = ['orientation'];
        render();
      });
    }

    /* ─── Render ────────────────────────────────────────────────────── */

    function render() {
      const app = document.getElementById('app');

      let body = '';
      if (appState.currentView === 'video')       body = renderVideo();
      if (appState.currentView === 'orientation') body = renderOrientation();
      if (appState.currentView === 'examples')    body = renderExamples();
      if (appState.currentView === 'builder')     body = renderBuilder();
      if (appState.currentView === 'completion')  body = renderCompletion();

      app.innerHTML = `
        ${renderTopbar()}
        ${renderProgress()}
        ${body}
      `;

      bindEvents();

      if (appState.currentView === 'completion') drawBadge();
    }

    render();
  </script>
